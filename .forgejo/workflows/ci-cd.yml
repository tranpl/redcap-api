name: Forgejo CI/CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Install .NET 8 SDK
        run: |
          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "dotnet is not installed and this runner does not provide apt-get."
            exit 1
          fi

          if [ ! -f /etc/os-release ]; then
            echo "Cannot determine runner OS; /etc/os-release is missing."
            exit 1
          fi

          . /etc/os-release

          case "${ID}:${VERSION_ID}" in
            ubuntu:20.04|ubuntu:22.04|ubuntu:24.04)
              REPO_URL="https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb"
              ;;
            debian:11|debian:12)
              REPO_URL="https://packages.microsoft.com/config/debian/${VERSION_ID}/packages-microsoft-prod.deb"
              ;;
            *)
              echo "Unsupported runner OS for automatic .NET install: ${ID}:${VERSION_ID}"
              exit 1
              ;;
          esac

          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y curl gpg
          curl -fsSL "$REPO_URL" -o packages-microsoft-prod.deb
          $SUDO dpkg -i packages-microsoft-prod.deb
          rm -f packages-microsoft-prod.deb
          $SUDO apt-get update
          $SUDO apt-get install -y dotnet-sdk-8.0
          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Restore
        run: dotnet restore RedcapApi.sln

      - name: Build
        run: dotnet build RedcapApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RedcapApi.Tests/RedcapApi.Tests.csproj --configuration Release --no-build --verbosity normal

  cd:
    name: Pack and Publish NuGet
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Install .NET 8 SDK
        run: |
          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "dotnet is not installed and this runner does not provide apt-get."
            exit 1
          fi

          if [ ! -f /etc/os-release ]; then
            echo "Cannot determine runner OS; /etc/os-release is missing."
            exit 1
          fi

          . /etc/os-release

          case "${ID}:${VERSION_ID}" in
            ubuntu:20.04|ubuntu:22.04|ubuntu:24.04)
              REPO_URL="https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb"
              ;;
            debian:11|debian:12)
              REPO_URL="https://packages.microsoft.com/config/debian/${VERSION_ID}/packages-microsoft-prod.deb"
              ;;
            *)
              echo "Unsupported runner OS for automatic .NET install: ${ID}:${VERSION_ID}"
              exit 1
              ;;
          esac

          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          $SUDO apt-get update
          $SUDO apt-get install -y curl gpg
          curl -fsSL "$REPO_URL" -o packages-microsoft-prod.deb
          $SUDO dpkg -i packages-microsoft-prod.deb
          rm -f packages-microsoft-prod.deb
          $SUDO apt-get update
          $SUDO apt-get install -y dotnet-sdk-8.0
          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Pack
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          dotnet pack RedcapApi/Redcap.csproj --configuration Release --output ./artifacts /p:Version="$VERSION"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate