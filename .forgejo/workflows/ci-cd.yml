name: Forgejo CI/CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Verify .NET 8 SDK
        run: |
          if ! command -v dotnet >/dev/null 2>&1; then
            echo "dotnet is not installed on this runner. Preinstall .NET 8 SDK on the Forgejo runner host and retry."
            exit 1
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Restore
        run: dotnet restore RedcapApi.sln

      - name: Build
        run: dotnet build RedcapApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RedcapApi.Tests/RedcapApi.Tests.csproj --configuration Release --no-build --verbosity normal

  cd:
    name: Pack and Publish NuGet
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Verify .NET 8 SDK
        run: |
          if ! command -v dotnet >/dev/null 2>&1; then
            echo "dotnet is not installed on this runner. Preinstall .NET 8 SDK on the Forgejo runner host and retry."
            exit 1
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Pack
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          dotnet pack RedcapApi/Redcap.csproj --configuration Release --output ./artifacts /p:Version="$VERSION"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate