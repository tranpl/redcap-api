name: Forgejo CI/CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Install .NET 8 SDK
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "Downloading dotnet-install.sh"
          curl --fail --silent --show-error --location \
            --connect-timeout 10 --max-time 90 \
            --retry 3 --retry-delay 2 --retry-all-errors \
            https://dot.net/v1/dotnet-install.sh \
            --output "$install_script"

          echo "Installing .NET SDK 8.0"
          timeout 600 bash "$install_script" --channel 8.0 --install-dir "$install_root" --verbose

          export DOTNET_ROOT="$install_root"
          export PATH="$DOTNET_ROOT:$PATH"

          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "$install_root" >> "$GITHUB_PATH"
          fi

          if [ -n "${GITHUB_ENV:-}" ]; then
            echo "DOTNET_ROOT=$install_root" >> "$GITHUB_ENV"
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Restore
        run: dotnet restore RedcapApi.sln

      - name: Build
        run: dotnet build RedcapApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RedcapApi.Tests/RedcapApi.Tests.csproj --configuration Release --no-build --verbosity normal

  cd:
    name: Pack and Publish NuGet
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Install .NET 8 SDK
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "Downloading dotnet-install.sh"
          curl --fail --silent --show-error --location \
            --connect-timeout 10 --max-time 90 \
            --retry 3 --retry-delay 2 --retry-all-errors \
            https://dot.net/v1/dotnet-install.sh \
            --output "$install_script"

          echo "Installing .NET SDK 8.0"
          timeout 600 bash "$install_script" --channel 8.0 --install-dir "$install_root" --verbose

          export DOTNET_ROOT="$install_root"
          export PATH="$DOTNET_ROOT:$PATH"

          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "$install_root" >> "$GITHUB_PATH"
          fi

          if [ -n "${GITHUB_ENV:-}" ]; then
            echo "DOTNET_ROOT=$install_root" >> "$GITHUB_ENV"
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Pack
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          dotnet pack RedcapApi/Redcap.csproj --configuration Release --output ./artifacts /p:Version="$VERSION"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate