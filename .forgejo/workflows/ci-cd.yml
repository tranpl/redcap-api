name: Forgejo CI/CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Ensure .NET SDK is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_via_apt() {
            if ! command -v apt-get >/dev/null 2>&1; then
              return 1
            fi

            echo "Trying apt-get fallback for .NET SDK 10.0"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y dotnet-sdk-10.0
          }

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "dotnet not found, installing .NET SDK 10.0"
          script_downloaded="false"
          for url in \
            "https://dot.net/v1/dotnet-install.sh" \
            "https://aka.ms/dotnet-install.sh" \
            "https://raw.githubusercontent.com/dotnet/install-scripts/main/src/dotnet-install.sh"
          do
            if curl --fail --silent --show-error --location \
              --connect-timeout 20 --max-time 180 \
              --retry 4 --retry-delay 3 --retry-all-errors \
              "$url" --output "$install_script"
            then
              script_downloaded="true"
              break
            fi
          done

          if [ "$script_downloaded" = "true" ]; then
            bash "$install_script" --channel 10.0 --install-dir "$install_root"

            export DOTNET_ROOT="$install_root"
            export PATH="$DOTNET_ROOT:$PATH"

            if [ -n "${GITHUB_PATH:-}" ]; then
              echo "$install_root" >> "$GITHUB_PATH"
            fi

            if [ -n "${GITHUB_ENV:-}" ]; then
              echo "DOTNET_ROOT=$install_root" >> "$GITHUB_ENV"
            fi
          else
            install_via_apt || true
          fi

          if ! command -v dotnet >/dev/null 2>&1; then
            echo "Failed to install .NET SDK 10.0 from script and apt-get fallback." >&2
            exit 1
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Restore
        run: dotnet restore RedcapApi.sln

      - name: Build
        run: dotnet build RedcapApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/RedcapApi.Tests/RedcapApi.Tests.csproj --configuration Release --no-build --verbosity normal

  cd:
    name: Pack and Publish NuGet
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: Ensure .NET SDK is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_via_apt() {
            if ! command -v apt-get >/dev/null 2>&1; then
              return 1
            fi

            echo "Trying apt-get fallback for .NET SDK 10.0"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y dotnet-sdk-10.0
          }

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "dotnet not found, installing .NET SDK 10.0"
          script_downloaded="false"
          for url in \
            "https://dot.net/v1/dotnet-install.sh" \
            "https://aka.ms/dotnet-install.sh" \
            "https://raw.githubusercontent.com/dotnet/install-scripts/main/src/dotnet-install.sh"
          do
            if curl --fail --silent --show-error --location \
              --connect-timeout 20 --max-time 180 \
              --retry 4 --retry-delay 3 --retry-all-errors \
              "$url" --output "$install_script"
            then
              script_downloaded="true"
              break
            fi
          done

          if [ "$script_downloaded" = "true" ]; then
            bash "$install_script" --channel 10.0 --install-dir "$install_root"

            export DOTNET_ROOT="$install_root"
            export PATH="$DOTNET_ROOT:$PATH"

            if [ -n "${GITHUB_PATH:-}" ]; then
              echo "$install_root" >> "$GITHUB_PATH"
            fi

            if [ -n "${GITHUB_ENV:-}" ]; then
              echo "DOTNET_ROOT=$install_root" >> "$GITHUB_ENV"
            fi
          else
            install_via_apt || true
          fi

          if ! command -v dotnet >/dev/null 2>&1; then
            echo "Failed to install .NET SDK 10.0 from script and apt-get fallback." >&2
            exit 1
          fi

          dotnet --info

      - name: Verify workspace checkout
        run: test -f RedcapApi.sln

      - name: Pack
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          dotnet pack src/RedcapApi/RedcapApi.csproj --configuration Release --output ./artifacts /p:Version="$VERSION"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate