name: Forgejo CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  restore-build-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout
        env:
          INTERNAL_GIT_SERVER_URL: ${{ vars.INTERNAL_GIT_SERVER_URL }}
        shell: bash
        run: |
          set -euo pipefail

          ref_name="${GITHUB_REF_NAME:-master}"
          ref_sha="${GITHUB_SHA:-}"
          repo_path="${GITHUB_REPOSITORY}.git"
          base_server="${INTERNAL_GIT_SERVER_URL:-${GITHUB_SERVER_URL}}"
          base_server="${base_server%/}"
          repo_url="${base_server}/${repo_path}"

          git init -b master .
          git remote add origin "${repo_url}"
          git -c http.version=HTTP/1.1 -c http.sslVersion=tlsv1.2 fetch --depth=1 origin "${ref_name}"
          git checkout --force FETCH_HEAD

          if [ -n "${ref_sha}" ] && [ "$(git rev-parse HEAD)" != "${ref_sha}" ]; then
            git -c http.version=HTTP/1.1 -c http.sslVersion=tlsv1.2 fetch --depth=1 origin "${ref_sha}"
            git checkout --force FETCH_HEAD
          fi

      - name: Dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore RedcapApi.sln

      - name: Build
        run: dotnet build RedcapApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/RedcapApi.Tests/RedcapApi.Tests.csproj --configuration Release --no-build --verbosity normal