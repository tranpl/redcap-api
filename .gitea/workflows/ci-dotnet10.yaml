name: CI DotNet10

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  restore-build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          ref="${GITHUB_SHA:-${GITHUB_REF_NAME:-master}}"
          repo_path="${GITHUB_REPOSITORY}.git"
          base_server="${GITHUB_SERVER_URL%/}"
          host="${base_server#https://}"
          host="${host#http://}"
          clone_bases=(
            "${base_server}"
            "https://${host}"
            "http://${host}"
          )

          echo "Checkout ref: ${ref}"

          git init .

          fetched="false"
          for base in "${clone_bases[@]}"; do
            url="${base%/}/${repo_path}"
            echo "Trying checkout from ${url}"

            git remote remove origin >/dev/null 2>&1 || true
            git remote add origin "${url}"

            for attempt in 1 2 3; do
              if git -c http.version=HTTP/1.1 fetch --depth=1 origin "${ref}"; then
                git checkout --force FETCH_HEAD
                fetched="true"
                break
              fi
              echo "Fetch failed from ${url} (attempt ${attempt}/3), retrying..."
              sleep 2
            done

            if [ "${fetched}" = "true" ]; then
              break
            fi
          done

          if [ "${fetched}" != "true" ]; then
            echo "Unable to checkout from any configured Git URL."
            exit 1
          fi

      - name: Ensure .NET SDK is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_via_apt() {
            if ! command -v apt-get >/dev/null 2>&1; then
              return 1
            fi

            echo "Trying apt-get fallback for .NET SDK 10.0"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y dotnet-sdk-10.0
          }

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "dotnet not found, installing .NET SDK 10.0"
          script_downloaded="false"
          for url in \
            "https://dot.net/v1/dotnet-install.sh" \
            "https://aka.ms/dotnet-install.sh" \
            "https://raw.githubusercontent.com/dotnet/install-scripts/main/src/dotnet-install.sh"
          do
            if curl -fsSL "$url" -o "$install_script"; then
              script_downloaded="true"
              break
            fi
          done

          if [ "$script_downloaded" = "true" ]; then
            chmod +x "$install_script"
            "$install_script" --channel 10.0 --install-dir "$install_root"
            export PATH="$install_root:$PATH"
            echo "$install_root" >> "$GITHUB_PATH"
            dotnet --info
            exit 0
          fi

          install_via_apt

      - name: Dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          test_projects="$(find . -type f -name '*Tests*.csproj' -o -name '*.Tests.csproj' || true)"
          if [ -z "${test_projects}" ]; then
            echo "No test projects found, skipping dotnet test."
            exit 0
          fi

          # Run all tests in one command so CI fails if any test fails.
          dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"