name: CI DotNet10

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  restore-build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout
        env:
          INTERNAL_GIT_SERVER_URL: ${{ vars.INTERNAL_GIT_SERVER_URL }}
        shell: bash
        run: |
          set -euo pipefail

          ref_name="${GITHUB_REF_NAME:-master}"
          ref_sha="${GITHUB_SHA:-}"
          repo_path="${GITHUB_REPOSITORY}.git"
          # Prefer an internal URL (for self-hosted runners) to avoid external proxy/TLS hairpin issues.
          # Use repo variable INTERNAL_GIT_SERVER_URL since some platforms reserve GITEA_* names.
          base_server="${INTERNAL_GIT_SERVER_URL:-${GITHUB_SERVER_URL}}"
          base_server="${base_server%/}"
          host="${base_server#https://}"
          host="${host#http://}"
          repo_url="${base_server}/${repo_path}"

          echo "Checkout ref name: ${ref_name}"
          echo "Checkout ref sha: ${ref_sha:-<none>}"
          echo "Git server URL: ${base_server}"
          echo "Git remote URL: ${repo_url}"

          echo "DNS resolution for ${host}:"
          getent hosts "${host}" || true

          echo "HTTP(S) probe for ${base_server}:"
          curl -IvsS --http1.1 --connect-timeout 10 --max-time 30 "${base_server}" || true

          echo "Git smart HTTP probe (ls-remote):"
          GIT_TRACE=1 GIT_TRACE_PACKET=1 GIT_CURL_VERBOSE=1 git -c http.version=HTTP/1.1 ls-remote "${repo_url}" HEAD

          git init -b master .
          git remote add origin "${repo_url}"

          GIT_TRACE=1 GIT_TRACE_PACKET=1 GIT_CURL_VERBOSE=1 git -c http.version=HTTP/1.1 -c http.sslVersion=tlsv1.2 fetch --depth=1 origin "${ref_name}"
          git checkout --force FETCH_HEAD

          # Ensure exact commit for event payload when SHA is provided.
          if [ -n "${ref_sha}" ] && [ "$(git rev-parse HEAD)" != "${ref_sha}" ]; then
            GIT_TRACE=1 GIT_TRACE_PACKET=1 GIT_CURL_VERBOSE=1 git -c http.version=HTTP/1.1 -c http.sslVersion=tlsv1.2 fetch --depth=1 origin "${ref_sha}"
            git checkout --force FETCH_HEAD
          fi

      - name: Ensure .NET SDK is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_via_apt() {
            if ! command -v apt-get >/dev/null 2>&1; then
              return 1
            fi

            echo "Trying apt-get fallback for .NET SDK 10.0"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            if ! dpkg -s packages-microsoft-prod >/dev/null 2>&1; then
              codename="$(. /etc/os-release && echo "${VERSION_CODENAME:-}")"
              if [ -z "$codename" ]; then
                codename="noble"
              fi
              repo_pkg="packages-microsoft-prod.deb"
              repo_url="https://packages.microsoft.com/config/ubuntu/${codename}/${repo_pkg}"
              repo_file="${RUNNER_TEMP:-/tmp}/${repo_pkg}"

              echo "Adding Microsoft package feed: ${repo_url}"
              curl -fsSL "$repo_url" -o "$repo_file"
              $SUDO dpkg -i "$repo_file"
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y dotnet-sdk-10.0
          }

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "dotnet not found, installing .NET SDK 10.0"
          script_downloaded="false"

          is_valid_install_script() {
            local script_path="$1"
            [ -s "$script_path" ] || return 1
            head -n 1 "$script_path" | grep -q '^#!' || return 1
            grep -q 'dotnet-install' "$script_path" || return 1
          }

          for url in \
            "https://dot.net/v1/dotnet-install.sh" \
            "https://aka.ms/dotnet-install.sh" \
            "https://raw.githubusercontent.com/dotnet/install-scripts/main/src/dotnet-install.sh"
          do
            if curl -fsSL "$url" -o "$install_script"; then
              if is_valid_install_script "$install_script"; then
                script_downloaded="true"
                break
              fi
              echo "Downloaded content from $url is not a valid dotnet install script; skipping."
            fi
          done

          if [ "$script_downloaded" = "true" ]; then
            chmod +x "$install_script"
            "$install_script" --channel 10.0 --install-dir "$install_root"
            export PATH="$install_root:$PATH"
            echo "$install_root" >> "$GITHUB_PATH"
            dotnet --info
            exit 0
          fi

          install_via_apt

      - name: Dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          test_projects="$(find . -type f -name '*Tests*.csproj' -o -name '*.Tests.csproj' || true)"
          if [ -z "${test_projects}" ]; then
            echo "No test projects found, skipping dotnet test."
            exit 0
          fi

          # Run all tests in one command so CI fails if any test fails.
          dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"