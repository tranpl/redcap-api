name: CI DotNet10

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  restore-build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail

          ref_name="${GITHUB_REF_NAME:-master}"
          ref_sha="${GITHUB_SHA:-}"
          repo_path="${GITHUB_REPOSITORY}.git"
          base_server="${GITHUB_SERVER_URL%/}"
          host="${base_server#https://}"
          host="${host#http://}"
          https_url="https://${host}/${repo_path}"
          http_url="http://${host}/${repo_path}"

          echo "Checkout branch: ${ref_name}"
          echo "Checkout sha: ${ref_sha:-<none>}"
          echo "Checkout https url: ${https_url}"
          echo "Checkout http url: ${http_url}"

          git init -b master .

          target_ref="${ref_sha:-${ref_name}}"

          git remote add origin "${https_url}"
          if ! GIT_TRACE=1 GIT_CURL_VERBOSE=1 git -c http.version=HTTP/1.1 fetch --depth=1 origin "${target_ref}"; then
            echo "HTTPS fetch failed, trying HTTP fallback once..."
            git remote set-url origin "${http_url}"
            GIT_TRACE=1 GIT_CURL_VERBOSE=1 git -c http.version=HTTP/1.1 fetch --depth=1 origin "${target_ref}"
          fi

          git checkout --force FETCH_HEAD

          # Ensure exact commit for event payload when SHA is provided.
          if [ -n "${ref_sha}" ] && [ "$(git rev-parse HEAD)" != "${ref_sha}" ]; then
            echo "Checked out commit does not match expected SHA"
            git rev-parse HEAD
            exit 1
          fi

      - name: Ensure .NET SDK is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v dotnet >/dev/null 2>&1; then
            dotnet --info
            exit 0
          fi

          install_via_apt() {
            if ! command -v apt-get >/dev/null 2>&1; then
              return 1
            fi

            echo "Trying apt-get fallback for .NET SDK 10.0"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            $SUDO apt-get update
            $SUDO apt-get install -y dotnet-sdk-10.0
          }

          install_root="$HOME/.dotnet"
          install_script="${RUNNER_TEMP:-/tmp}/dotnet-install.sh"

          echo "dotnet not found, installing .NET SDK 10.0"
          script_downloaded="false"
          for url in \
            "https://dot.net/v1/dotnet-install.sh" \
            "https://aka.ms/dotnet-install.sh" \
            "https://raw.githubusercontent.com/dotnet/install-scripts/main/src/dotnet-install.sh"
          do
            if curl -fsSL "$url" -o "$install_script"; then
              script_downloaded="true"
              break
            fi
          done

          if [ "$script_downloaded" = "true" ]; then
            chmod +x "$install_script"
            "$install_script" --channel 10.0 --install-dir "$install_root"
            export PATH="$install_root:$PATH"
            echo "$install_root" >> "$GITHUB_PATH"
            dotnet --info
            exit 0
          fi

          install_via_apt

      - name: Dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          test_projects="$(find . -type f -name '*Tests*.csproj' -o -name '*.Tests.csproj' || true)"
          if [ -z "${test_projects}" ]; then
            echo "No test projects found, skipping dotnet test."
            exit 0
          fi

          # Run all tests in one command so CI fails if any test fails.
          dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"